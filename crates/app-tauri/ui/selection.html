<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择 OCR 区域</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
        background: transparent;
      }
      #hint {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 6px;
        background: rgba(20, 27, 38, 0.86);
        color: white;
        font: 14px "Microsoft YaHei UI", "Segoe UI", sans-serif;
        pointer-events: none;
      }
      #box {
        position: fixed;
        display: none;
        border: 2px solid #39a3ff;
        background: rgba(57, 163, 255, 0.16);
      }
    </style>
  </head>
  <body>
    <div id="hint">拖动选择要翻译的区域，右键或 Esc 取消</div>
    <div id="box"></div>
    <script>
      const invoke = (...args) => window.__TAURI__.core.invoke(...args);
      const listen = (...args) => window.__TAURI__.event.listen(...args);
      const box = document.querySelector("#box");
      let start = null;

      function resetSelection() {
        start = null;
        box.style.display = "none";
        box.style.left = "0px";
        box.style.top = "0px";
        box.style.width = "0px";
        box.style.height = "0px";
      }

      function rectFrom(start, end) {
        const x = Math.min(start.x, end.x);
        const y = Math.min(start.y, end.y);
        const width = Math.abs(end.x - start.x);
        const height = Math.abs(end.y - start.y);
        return { x, y, width, height };
      }

      function draw(rect) {
        box.style.display = "block";
        box.style.left = `${rect.x}px`;
        box.style.top = `${rect.y}px`;
        box.style.width = `${rect.width}px`;
        box.style.height = `${rect.height}px`;
      }

      async function cancelSelection(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        resetSelection();
        await invoke("selection_cancel");
      }

      window.addEventListener("mousedown", async (event) => {
        if (event.button === 2) {
          await cancelSelection(event);
          return;
        }
        if (event.button !== 0) return;
        invoke("get_cursor_position")
          .then((point) => {
            start = {
              screen: point,
              client: { x: event.clientX, y: event.clientY },
            };
            draw({ x: event.clientX, y: event.clientY, width: 1, height: 1 });
          })
          .catch(async () => {
            await invoke("selection_cancel");
          });
      });

      window.addEventListener("mousemove", (event) => {
        if (!start) return;
        draw(rectFrom(start.client, { x: event.clientX, y: event.clientY }));
      });

      window.addEventListener("mouseup", async (event) => {
        if (event.button === 2) {
          await cancelSelection(event);
          return;
        }
        if (!start || event.button !== 0) return;
        const end = await invoke("get_cursor_position");
        const rect = rectFrom(start.screen, end);
        start = null;
        if (rect.width < 16 || rect.height < 16) {
          resetSelection();
          await invoke("selection_auto_detect", { anchor: end });
          return;
        }
        await invoke("selection_done", {
          payload: {
            rect,
            anchor: end,
          },
        });
      });

      window.addEventListener("keydown", async (event) => {
        if (event.key === "Escape") {
          await cancelSelection(event);
        }
      });

      window.addEventListener("contextmenu", cancelSelection);
      listen("selection-reset", resetSelection);
      window.addEventListener("blur", resetSelection);
    </script>
  </body>
</html>
