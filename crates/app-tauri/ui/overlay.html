<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR 翻译</title>
    <style>
      html,
      body {
        width: 100%;
        height: auto;
        min-height: 0;
        margin: 0;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }
      body {
        position: relative;
      }
      #card {
        width: 100vw;
        height: auto;
        min-height: 0;
        max-height: 620px;
        display: flex;
        align-items: stretch;
        overflow: hidden;
        border-radius: 8px;
      }
      #blocks {
        flex: 1 1 auto;
        width: auto;
        min-width: 0;
        height: auto;
        min-height: 0;
        max-height: inherit;
        padding: 0;
        color: white;
        display: flex;
        flex-direction: column;
        gap: 0;
        align-items: start;
        justify-content: flex-start;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.95),
          1px 0 1px rgba(0, 0, 0, 0.85),
          -1px 0 1px rgba(0, 0, 0, 0.85),
          0 -1px 1px rgba(0, 0, 0, 0.85);
        font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
        line-height: 1.45;
        white-space: normal;
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: auto;
        cursor: default;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.42) rgba(0, 0, 0, 0.08);
      }
      #resizeHandle {
        flex: 0 0 6px;
        width: 6px;
        min-width: 6px;
        cursor: ew-resize;
        background: transparent;
        align-self: stretch;
      }
      #resizeHandle::after {
        content: "";
        display: block;
        width: 2px;
        height: calc(100% - 20px);
        min-height: 28px;
        margin: 10px 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0);
        transition: background 120ms ease;
      }
      #resizeHandle:hover::after,
      #resizeHandle.resizing::after {
        background: rgba(255, 255, 255, 0.36);
      }
      #blocks::-webkit-scrollbar {
        width: 8px;
      }
      #blocks::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.08);
      }
      #blocks::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.34);
        border-radius: 999px;
        border: 2px solid rgba(0, 0, 0, 0.08);
      }
      #blocks::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.52);
      }
      #blocks.scrolling {
        overflow-y: scroll;
      }
      #blocks.draggable {
        cursor: move;
      }
      .block {
        padding: 6px 12px 14px;
        border: 0;
        border-radius: 0;
        box-sizing: border-box;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        flex: 0 0 auto;
        min-height: 0;
        align-self: start;
        overflow: visible;
      }
      .block:first-child {
        border-radius: 8px 8px 0 0;
      }
      .block:last-child {
        border-radius: 0 0 8px 8px;
      }
      .block:only-child {
        border-radius: 8px;
      }
      #translationBlock.solo {
        border-radius: 8px;
      }
      .title {
        margin: 0 0 4px;
        color: rgba(255, 255, 255, 0.96);
        font-size: 0.72em;
        font-weight: 700;
        line-height: 1;
      }
      .section {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        align-self: stretch;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
      }
      #sourceBlock {
        background: rgba(40, 88, 165, 0.55);
      }
      #translationBlock {
        background: rgba(18, 120, 88, 0.55);
      }
      #sourceText {
        color: rgba(255, 255, 255, 0.98);
        font-size: 0.86em;
      }
      #translationText {
        color: rgba(255, 255, 255, 1);
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="blocks">
        <div id="sourceBlock" class="block hidden">
          <div class="title">原文</div>
          <div id="sourceText" class="section"></div>
        </div>
        <div id="translationBlock" class="block">
          <div id="translationTitle" class="title hidden">译文</div>
          <div id="translationText" class="section"></div>
        </div>
      </div>
      <div id="resizeHandle" title="拖动调整宽度"></div>
    </div>
    <script>
      const invoke = (...args) => window.__TAURI__.core.invoke(...args);
      const listen = (...args) => window.__TAURI__.event.listen(...args);
      const blocks = document.querySelector("#blocks");
      const sourceBlock = document.querySelector("#sourceBlock");
      const sourceText = document.querySelector("#sourceText");
      const translationBlock = document.querySelector("#translationBlock");
      const translationTitle = document.querySelector("#translationTitle");
      const translationText = document.querySelector("#translationText");
      const resizeHandle = document.querySelector("#resizeHandle");
      let doubleClickClose = true;
      let draggable = true;
      let maxHeight = 620;
      let resizeFrame = 0;
      let resizeTimer = 0;
      let lastResizeRequest = { width: 0, height: 0 };
      let manualWidth = null;
      let resizing = null;

      function cleanDisplayText(value) {
        return String(value ?? "")
          .replace(/\r\n/g, "\n")
          .split("\n")
          .map((line) => line.trim())
          .join("\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function hexToRgba(hex, opacity, fallback) {
        const value = /^#[0-9a-f]{6}$/i.test(String(hex ?? "")) ? hex : fallback;
        const intValue = Number.parseInt(value.slice(1), 16);
        const r = (intValue >> 16) & 255;
        const g = (intValue >> 8) & 255;
        const b = intValue & 255;
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
      }

      function render(payload) {
        const rawText = cleanDisplayText(payload.raw_text);
        const translatedText = cleanDisplayText(payload.text) || "无翻译结果";
        const showSource = payload.show_source === true && !!rawText;
        sourceText.textContent = showSource ? rawText : "";
        sourceBlock.classList.toggle("hidden", !showSource);
        translationBlock.classList.toggle("solo", !showSource);
        translationTitle.classList.toggle("hidden", !showSource);
        translationText.textContent = translatedText;
        const opacity = payload.opacity ?? 0.55;
        maxHeight = Math.max(54, Number(payload.max_height ?? 620));
        sourceBlock.style.background = hexToRgba(payload.source_background, opacity, "#2858a5");
        translationBlock.style.background = hexToRgba(
          payload.translation_background,
          opacity,
          "#127858",
        );
        blocks.style.fontSize = `${payload.font_size ?? 18}px`;
        document.querySelector("#card").style.maxHeight = `${maxHeight}px`;
        blocks.classList.remove("scrolling");
        manualWidth = null;
        lastResizeRequest = { width: 0, height: 0 };
        doubleClickClose = payload.double_click_close !== false;
        draggable = payload.draggable !== false;
        blocks.classList.toggle("draggable", draggable);
        requestAnimationFrame(resizeToContent);
      }

      function scheduleResizeToContent() {
        if (resizeFrame) {
          cancelAnimationFrame(resizeFrame);
        }
        resizeFrame = requestAnimationFrame(resizeToContent);
      }

      async function resizeToContent() {
        blocks.style.height = "auto";
        blocks.style.minHeight = "0";
        const contentHeight =
          sourceBlock.getBoundingClientRect().height +
          translationBlock.getBoundingClientRect().height;
        blocks.classList.toggle("scrolling", contentHeight > maxHeight + 1);
        const cardRect = document.querySelector("#card").getBoundingClientRect();
        const width = Math.ceil(manualWidth ?? window.innerWidth ?? cardRect.width ?? 180);
        const measuredHeight = Math.max(blocks.scrollHeight, contentHeight, cardRect.height);
        const height = Math.ceil(Math.min(measuredHeight, maxHeight) + 2);
        if (
          Math.abs(lastResizeRequest.width - width) <= 1 &&
          Math.abs(lastResizeRequest.height - height) <= 1
        ) {
          return;
        }
        lastResizeRequest = { width, height };
        await invoke("resize_overlay_to_content", {
          request: {
            width: Math.max(width, 160),
            height: Math.max(height, 54),
          },
        }).catch(() => {});
      }

      listen("overlay-show", (event) => {
        render(event.payload);
      });

      invoke("get_overlay_payload")
        .then((payload) => {
          if (payload) render(payload);
        })
        .catch(() => {});

      window.addEventListener("dblclick", async () => {
        if (doubleClickClose) {
          await invoke("close_overlay");
        }
      });

      window.addEventListener("mousedown", async (event) => {
        if (
          !draggable ||
          event.button !== 0 ||
          event.detail > 1 ||
          event.target === resizeHandle
        )
          return;
        event.preventDefault();
        await invoke("start_overlay_drag").catch(() => {});
      });
      resizeHandle.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        event.preventDefault();
        event.stopPropagation();
        resizeHandle.setPointerCapture(event.pointerId);
        resizeHandle.classList.add("resizing");
        resizing = {
          pointerId: event.pointerId,
          startX: event.screenX,
          startWidth: window.innerWidth || blocks.getBoundingClientRect().width || 160,
          pendingWidth: window.innerWidth || blocks.getBoundingClientRect().width || 160,
          frame: 0,
        };
      });
      resizeHandle.addEventListener("pointermove", (event) => {
        if (!resizing || resizing.pointerId !== event.pointerId) return;
        event.preventDefault();
        const width = Math.max(180, Math.min(900, resizing.startWidth + event.screenX - resizing.startX));
        resizing.pendingWidth = width;
        manualWidth = width;
        if (resizing.frame) return;
        resizing.frame = requestAnimationFrame(async () => {
          if (!resizing) return;
          const requestWidth = Math.round(resizing.pendingWidth);
          resizing.frame = 0;
          await invoke("resize_overlay_to_content", {
            request: {
              width: requestWidth,
              height: Math.max(window.innerHeight || 54, 54),
            },
          }).catch(() => {});
        });
      });
      function stopResize(event) {
        if (!resizing || resizing.pointerId !== event.pointerId) return;
        if (resizing.frame) {
          cancelAnimationFrame(resizing.frame);
        }
        manualWidth = Math.max(180, Math.min(900, resizing.pendingWidth));
        resizing = null;
        resizeHandle.classList.remove("resizing");
        scheduleResizeToContent();
      }
      resizeHandle.addEventListener("pointerup", stopResize);
      resizeHandle.addEventListener("pointercancel", stopResize);
      window.addEventListener("resize", () => {
        if (resizing) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(scheduleResizeToContent, 80);
      });
    </script>
  </body>
</html>
