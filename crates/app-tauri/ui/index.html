<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Translator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>OCR Translator</h1>
          <p>独立实现的截图 OCR 翻译工具，适合游戏、软件和网页内快速选区翻译。</p>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>基础设置</h2>
          <label>
            源语言
            <select id="sourceLang">
              <option value="auto">自动</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
              <option value="zh-CN">简体中文</option>
            </select>
          </label>
          <label>
            目标语言
            <select id="targetLang">
              <option value="zh-CN">简体中文</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
            </select>
          </label>
          <label>
            快捷键
            <input id="hotkey" class="hotkey-input" type="text" readonly />
          </label>
          <div class="hint" id="ocrStatus">OCR：SnippingTool OneOCR</div>
        </article>

        <article class="panel">
          <h2>浮窗设置</h2>
          <label>
            默认宽度
            <input id="overlayWidth" type="number" min="180" max="900" step="10" />
          </label>
          <label>
            字体大小
            <input id="fontSize" type="number" min="12" max="48" step="1" />
          </label>
          <label>
            背景透明度
            <input id="opacity" type="number" min="0.05" max="0.9" step="0.05" />
          </label>
          <div class="color-grid">
            <label>
              原文背景
              <input id="sourceBackground" type="color" />
            </label>
            <label>
              译文背景
              <input id="translationBackground" type="color" />
            </label>
          </div>
          <label>
            屏幕边距
            <input id="screenMargin" type="number" min="0" max="120" step="1" />
          </label>
          <label class="check">
            <input id="doubleClickClose" type="checkbox" />
            双击关闭
          </label>
          <label class="check">
            <input id="showSource" type="checkbox" />
            原文在上，译文在下
          </label>
          <label class="check">
            <input id="overlayDraggable" type="checkbox" />
            允许拖动浮窗
          </label>
        </article>

        <article class="panel wide">
          <h2>翻译源</h2>
          <div class="provider-row">
            <label>
              翻译源
              <select id="translator"></select>
            </label>
            <span id="providerBadge" class="badge"></span>
          </div>
          <div id="providerFields" class="fields"></div>
        </article>
      </section>
      <div id="status" class="status footer-status"></div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
