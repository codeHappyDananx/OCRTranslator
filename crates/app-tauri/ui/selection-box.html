<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR 选区</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
        user-select: none;
      }
      #box {
        position: fixed;
        inset: 0;
        box-sizing: border-box;
        border: 2px solid #39a3ff;
        background: rgba(57, 163, 255, 0.14);
      }
      #hint {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        border-radius: 8px;
        background: rgba(18, 24, 34, 0.78);
        color: rgba(255, 255, 255, 0.96);
        font: 13px "Microsoft YaHei UI", "Segoe UI", sans-serif;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
      }
      body.hint #box {
        display: none;
      }
      body.hint #hint {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
    <div id="hint">拖动选择文字 · 右键取消</div>
    <script>
      const listen = (...args) => window.__TAURI__.event.listen(...args);
      listen("selection-box-mode", (event) => {
        document.body.classList.toggle("hint", event.payload === "hint");
      });
    </script>
  </body>
</html>
